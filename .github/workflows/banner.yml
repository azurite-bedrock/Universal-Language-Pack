name: Update Banner

on:
    schedule:
        - cron: '0 */6 * * *'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    update:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x

            - name: Cache Astral Chromium
              uses: actions/cache@v4
              with:
                  path: ~/.cache/astral
                  key: astral-chromium-${{ runner.os }}-v1

            - name: Generate banner
              run: deno run --allow-net --allow-env --allow-read --allow-write --allow-run --allow-sys scripts/generate-banner.ts
              env:
                  CROWDIN_API: ${{ secrets.CROWDIN_API }}

            - name: Commit if changed
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add assets/
                  git diff --staged --quiet || (git commit -m "chore: update banner" && git pull --rebase origin main && git push origin main)
