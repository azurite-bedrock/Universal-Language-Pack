name: Pull

on:
    schedule:
        - cron: '0 5 * * *'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    pull:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install Crowdin CLI
              run: npm install -g @crowdin/cli

            - name: Download Crowdin bundle
              run: crowdin bundle download 3 --project-id=775034 --no-progress
              env:
                  CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_API }}

            - name: Commit translation updates
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add locales/
                  git diff --staged --quiet || (git commit -m "chore: update translations from Crowdin" && git push origin main)
